<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIS Midterm Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .quiz-container {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 650px;
      overflow: hidden;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      padding: 25px 30px;
      text-align: center;
      color: white;
    }

    .quiz-header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .quiz-header p {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .header-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
    }

    .header-btn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: white;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .header-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .progress-container {
      padding: 20px 30px 10px;
    }

    .progress-bar {
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1e3c72, #2a5298);
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.85rem;
      color: #666;
      font-weight: 500;
    }

    .quiz-body {
      padding: 25px 30px;
    }

    .topic-badge {
      display: inline-block;
      padding: 5px 14px;
      background: #e8f4fd;
      color: #1e3c72;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: #222;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      padding: 14px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      color: #555;
      background: white;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option:hover:not(.disabled) {
      border-color: #1e3c72;
      background: #f0f5ff;
      transform: translateX(5px);
    }

    .option.selected {
      border-color: #1e3c72;
      background: #1e3c72;
      color: white;
    }

    .option.correct {
      border-color: #10b981;
      background: #10b981;
      color: white;
      animation: pulse 0.5s ease;
    }

    .option.incorrect {
      border-color: #ef4444;
      background: #ef4444;
      color: white;
      animation: shake 0.5s ease;
    }

    .option.disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.8rem;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .option.selected .option-letter,
    .option.correct .option-letter,
    .option.incorrect .option-letter {
      background: rgba(255, 255, 255, 0.3);
      color: white;
    }

    .quiz-footer {
      padding: 20px 30px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #eee;
    }

    .score-display {
      font-size: 0.9rem;
      color: #666;
      font-weight: 500;
    }

    .score-display span {
      color: #1e3c72;
      font-weight: 700;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30, 60, 114, 0.4);
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: white;
      color: #1e3c72;
      border: 2px solid #1e3c72;
    }

    .btn-secondary:hover {
      background: #1e3c72;
      color: white;
    }

    /* Results Screen */
    .results-container {
      text-align: center;
      padding: 35px 25px;
    }

    .results-icon {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 2.5rem;
      color: white;
      animation: bounce 1s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .results-title {
      font-size: 1.6rem;
      color: #222;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .results-score {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .results-message {
      font-size: 1rem;
      color: #666;
      margin-bottom: 25px;
    }

    .results-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 25px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #222;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #888;
    }

    .stat-item.correct .stat-value {
      color: #10b981;
    }

    .stat-item.incorrect .stat-value {
      color: #ef4444;
    }

    .results-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .quiz-header h1 {
        font-size: 1.3rem;
      }
      
      .question-text {
        font-size: 1rem;
      }
      
      .option {
        padding: 12px 14px;
        font-size: 0.9rem;
      }
      
      .quiz-footer {
        flex-direction: column;
        gap: 12px;
      }
      
      .btn {
        width: 100%;
      }

      .results-stats {
        gap: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <div class="quiz-header">
      <h1>MIS Midterm Quiz</h1>
      <p>Management Information Systems - STI Handouts</p>
      <div class="header-buttons">
        <button class="header-btn" onclick="shuffleQuestions()">🔀 Shuffle Questions</button>
        <button class="header-btn" onclick="restartQuiz()">🔄 New Quiz</button>
      </div>
    </div>
    
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text">
        <span>Question <span id="currentQ">1</span> of <span id="totalQ">87</span></span>
        <span>Score: <span id="score">0</span></span>
      </div>
    </div>

    <div class="quiz-body" id="quizBody">
      <span class="topic-badge" id="topicBadge">Topic</span>
      <div class="question-container">
        <h2 class="question-text" id="questionText"></h2>
        <div class="options-container" id="optionsContainer"></div>
      </div>
    </div>

    <div class="quiz-footer">
      <button class="btn btn-secondary" onclick="shuffleOptions()">🔀 Shuffle Answers</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Next Question</button>
    </div>

    <!-- Results Screen (Hidden by default) -->
    <div class="results-container" id="resultsContainer" style="display: none;">
      <div class="results-icon" id="resultsIcon">🎉</div>
      <h2 class="results-title">Quiz Complete!</h2>
      <p class="results-score" id="resultsScore">0 / 87</p>
      <p class="results-message" id="resultsMessage">Great job!</p>
      
      <div class="results-stats">
        <div class="stat-item correct">
          <div class="stat-value" id="correctCount">0</div>
          <div class="stat-label">Correct</div>
        </div>
        <div class="stat-item incorrect">
          <div class="stat-value" id="incorrectCount">0</div>
          <div class="stat-label">Incorrect</div>
        </div>
      </div>
      
      <div class="results-buttons">
        <button class="btn btn-primary" onclick="restartQuiz()">Try Again</button>
        <button class="btn btn-secondary" onclick="showAnswers()">View Answers</button>
      </div>
    </div>
  </div>

  <script>
    // MIS Midterm Questions - EXACT wording from PDF
    const allQuestions = [
      // End-User Computing (from Handout 04)
      { topic: "End-User Computing", question: "What is End-User Computing (EUC)?", options: ["Computer systems that allow non-programmers to create applications", "Systems for programming developers", "Hardware-only solutions", "Network infrastructure"], correct: 0 },
      { topic: "End-User Computing", question: "Which is NOT a type of EUC?", options: ["Mainframe Computers", "Desktop and Laptop Computers", "Smartphones and Wearables", "Mobile, Web, and Cloud Applications"], correct: 0 },

      { topic: "Office Automation", question: "What is Office Automation?", options: ["Complete integration of basic office requirements", "Only word processing", "Hardware maintenance", "Network installation"], correct: 0 },

      { topic: "Electronic Communication Systems", question: "Which is an example of Synchronous communication?", options: ["Chat rooms, instant messaging, and audio/video teleconferencing", "Email and forums", "Online bulletin boards", "Message boards"], correct: 0 },

      { topic: "Electronic Communication Systems", question: "What does Push technology mean?", options: ["Discussion comes to the user automatically", "User must log in", "Manual retrieval required", "No internet needed"], correct: 0 },
      { topic: "Electronic Communication Systems", question: "What is Electronic Publishing?", options: ["Digital publication of textual material and readable information", "Physical book printing", "Fax machine", "Postal mail"], correct: 0 },
      { topic: "Electronic Communication Systems", question: "Which is an example of Portable Electronic Media?", options: ["CDs/DVDs/BDs, Flash Drives, or External Hard Drives", "Blogs", "E-books", "Online newspapers"], correct: 0 },

      { topic: "Electronic Communication Systems", question: "What is a benefit of Electronic Publishing?", options: ["Paperless, Environment-Friendly Medium", "Requires more paper", "Higher distribution costs", "Slower distribution"], correct: 0 },
      { topic: "Electronic Communication Systems", question: "What is a risk of Electronic Publishing?", options: ["Security Issues and Plagiarism", "Faster distribution", "Lower costs", "Environmental benefits"], correct: 0 },

      // Telecommunications (from Handout 07)
      { topic: "Telecommunications", question: "What is Telecommunication in business?", options: ["Sharing information over a distance", "Local storage only", "Manual filing", "Hardware installation"], correct: 0 },
      { topic: "Telecommunications", question: "What is Internal, Downward communication?", options: ["Information from managers cascaded down to departments - memo from executives to various departments", "Email from customer", "Budget approval to manager", "Business pitch to client"], correct: 0 },
      { topic: "Telecommunications", question: "What is Internal, Upward communication?", options: ["Subordinates sending information up hierarchy - budget approval document to manager", "Executive memo to staff", "Email between coworkers", "Vendor proposal"], correct: 0 },
      { topic: "Telecommunications", question: "What is Internal, Lateral communication?", options: ["Email correspondence between employees of the same department", "Memo from CEO", "Customer complaint", "Vendor meeting"], correct: 0 },
      { topic: "Telecommunications", question: "What is External communication?", options: ["Business pitch to customers, prospects, vendors, or partners", "Memo to staff", "Internal meeting", "Department email"], correct: 0 },

      { topic: "Telecommunications", question: "What is Chain Network?", options: ["Members communicate in a set sequence following organizational hierarchy", "Random communication order", "All-channel communication", "Circular pattern"], correct: 0 },

      { topic: "E-Business", question: "What is B2C e-commerce?", options: ["Business to Consumer transactions", "Business to Business", "Consumer to Consumer", "Government to Business"], correct: 0 },
      { topic: "E-Business", question: "What is Wider Market Access in E-Business?", options: ["Broader reach to target market through Internet", "Limited to local area", "Only physical stores", "No marketing needed"], correct: 0 },

      { topic: "TPS", question: "Which is an example of Internal Transaction?", options: ["Recruitment Policy Systems and Approval Systems", "Sales System", "Purchasing System", "Supply Chain System"], correct: 0 },

      { topic: "Operational IS", question: "What processes does Operational IS automate?", options: ["Routine business processes", "Strategic planning", "Executive decisions", "Marketing campaigns"], correct: 0 },

    let currentQuestion = 0;
    let score = 0;
    let correctAnswers = 0;
    let incorrectAnswers = 0;
    let selectedAnswer = null;
    let userAnswers = [];
    let questions = [];
    let originalQuestions = [];

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function shuffleQuestions() {
      let shuffledQuestions = shuffleArray(allQuestions).slice(0, 87);
      questions = shuffledQuestions.map(q => {
        const correctAnswerText = q.options[q.correct];
        const shuffledOptions = shuffleArray(q.options);
        const newCorrectIndex = shuffledOptions.indexOf(correctAnswerText);
        return {
          ...q,
          options: shuffledOptions,
          correct: newCorrectIndex
        };
      });
      originalQuestions = [...questions];
      currentQuestion = 0;
      score = 0;
      correctAnswers = 0;
      incorrectAnswers = 0;
      userAnswers = [];
      selectedAnswer = null;
      
      document.getElementById('totalQ').textContent = questions.length;
      document.getElementById('quizBody').style.display = 'block';
      document.getElementById('resultsContainer').style.display = 'none';
      
      loadQuestion();
    }

    function shuffleOptions() {
      if (selectedAnswer !== null) return;
      
      const currentQ = questions[currentQuestion];
      const correctAnswerText = currentQ.options[currentQ.correct];
      
      const shuffledOptions = shuffleArray(currentQ.options);
      const newCorrectIndex = shuffledOptions.indexOf(correctAnswerText);
      
      currentQ.options = shuffledOptions;
      currentQ.correct = newCorrectIndex;
      
      loadQuestion();
    }

    function initQuiz() {
      let shuffledQuestions = shuffleArray(allQuestions).slice(0, 87);
      questions = shuffledQuestions.map(q => {
        const correctAnswerText = q.options[q.correct];
        const shuffledOptions = shuffleArray(q.options);
        const newCorrectIndex = shuffledOptions.indexOf(correctAnswerText);
        return {
          ...q,
          options: shuffledOptions,
          correct: newCorrectIndex
        };
      });
      originalQuestions = [...questions];
      currentQuestion = 0;
      score = 0;
      correctAnswers = 0;
      incorrectAnswers = 0;
      userAnswers = [];
      selectedAnswer = null;
      
      document.getElementById('totalQ').textContent = questions.length;
      document.getElementById('quizBody').style.display = 'block';
      document.getElementById('resultsContainer').style.display = 'none';
      
      loadQuestion();
    }

    function loadQuestion() {
      const question = questions[currentQuestion];
      document.getElementById('questionText').textContent = question.question;
      document.getElementById('topicBadge').textContent = question.topic;
      document.getElementById('currentQ').textContent = currentQuestion + 1;
      document.getElementById('score').textContent = score;
      
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
      
      const optionsContainer = document.getElementById('optionsContainer');
      optionsContainer.innerHTML = '';
      
      const letters = ['A', 'B', 'C', 'D'];
      question.options.forEach((option, index) => {
        const optionDiv = document.createElement('div');
        optionDiv.className = 'option';
        optionDiv.innerHTML = `
          <span class="option-letter">${letters[index]}</span>
          <span>${option}</span>
        `;
        optionDiv.onclick = () => selectOption(index);
        optionsContainer.appendChild(optionDiv);
      });
      
      document.getElementById('nextBtn').disabled = true;
      selectedAnswer = null;
    }

    function selectOption(index) {
      if (selectedAnswer !== null) return;
      
      selectedAnswer = index;
      const options = document.querySelectorAll('.option');
      
      options.forEach((option, i) => {
        option.classList.add('disabled');
        if (i === index) {
          option.classList.add('selected');
        }
      });
      
      userAnswers.push({
        question: questions[currentQuestion],
        selected: index,
        correct: index === questions[currentQuestion].correct
      });
      
      if (index === questions[currentQuestion].correct) {
        score += 1;
        correctAnswers++;
        options[index].classList.add('correct');
        document.getElementById('score').textContent = score;
      } else {
        incorrectAnswers++;
        options[index].classList.add('incorrect');
        options[questions[currentQuestion].correct].classList.add('correct');
      }
      
      document.getElementById('nextBtn').disabled = false;
    }

    function nextQuestion() {
      currentQuestion++;
      
      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      document.getElementById('quizBody').style.display = 'none';
      document.querySelector('.quiz-footer').style.display = 'none';
      document.getElementById('resultsContainer').style.display = 'block';
      
      document.getElementById('resultsScore').textContent = `${score} / ${questions.length}`;
      document.getElementById('correctCount').textContent = correctAnswers;
      document.getElementById('incorrectCount').textContent = incorrectAnswers;
      
      let message = '';
      let icon = '';
      const percentage = (score / questions.length) * 100;
      
      if (percentage >= 90) {
        message = 'Outstanding! You\'re an MIS Master! 🏆';
        icon = '🏆';
      } else if (percentage >= 70) {
        message = 'Great job! You know your MIS! 🌟';
        icon = '🌟';
      } else if (percentage >= 50) {
        message = 'Good effort! Keep studying! 📚';
        icon = '📚';
      } else {
        message = 'Keep practicing! You\'ll get better! 💪';
        icon = '💪';
      }
      
      document.getElementById('resultsMessage').textContent = message;
      document.getElementById('resultsIcon').textContent = icon;
    }

    function restartQuiz() {
      document.querySelector('.quiz-footer').style.display = 'flex';
      initQuiz();
    }

    function showAnswers() {
      let answersHTML = '<div class="quiz-body"><div class="question-container">';
      
      userAnswers.forEach((answer, index) => {
        const letters = ['A', 'B', 'C', 'D'];
        answersHTML += `
          <div style="margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 12px;">
            <span class="topic-badge" style="font-size: 0.7rem; margin-bottom: 8px; display: inline-block;">${answer.question.topic}</span>
            <h3 style="font-size: 0.95rem; color: #333; margin-bottom: 10px;">${index + 1}. ${answer.question.question}</h3>
            <p style="color: ${answer.correct ? '#10b981' : '#ef4444'}; font-weight: 600; font-size: 0.9rem;">
              ${answer.correct ? '✓' : '✗'} Your answer: ${letters[answer.selected]} - ${answer.question.options[answer.selected]}
            </p>
            ${!answer.correct ? `<p style="color: #10b981; margin-top: 5px; font-size: 0.9rem;">✓ Correct: ${letters[answer.question.correct]} - ${answer.question.options[answer.question.correct]}</p>` : ''}
          </div>
        `;
      });
      
      answersHTML += '</div></div>';
      
      document.querySelector('.progress-container').style.display = 'none';
      document.querySelector('.quiz-header').style.display = 'none';
      document.getElementById('resultsContainer').style.display = 'none';
      
      const quizContainer = document.querySelector('.quiz-container');
      quizContainer.innerHTML = `
        <div style="padding: 25px; text-align: center;">
          <h2 style="color: #1e3c72; margin-bottom: 5px;">Quiz Answers</h2>
          <p style="color: #666; font-size: 0.9rem;">Review your answers below</p>
        </div>
        ${answersHTML}
        <div style="padding: 20px 25px 25px; text-align: center;">
          <button class="btn btn-primary" onclick="location.reload()">Back to Quiz</button>
        </div>
      `;
    }

    // Initialize quiz on page load
    initQuiz();
  </script>
</body>
</html>
